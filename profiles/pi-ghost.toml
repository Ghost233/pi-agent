version = 1
profile = "pi-ghost"

[local]
agent_dir = "~/.pi/agent-pi-ghost"
target_config = "~/.pi/agent-pi-ghost/profile.toml"
launcher = "~/.local/bin/pi-ghost"
dag_launcher = "~/.local/bin/pi-ghost-dag"

[install]
backup_existing = true
install_pi_cli = true
install_extensions = true
update_extensions = true
create_launcher = true
create_dag_launcher = true

[[remove_extensions]]
name = "pi-agent-flow"
source = "npm:pi-agent-flow"

[[remove_extensions]]
name = "pi-context-usage"
source = "npm:pi-context-usage"

[[remove_extensions]]
name = "pi-statusline"
source = "npm:@narumitw/pi-statusline"

[[remove_extensions]]
name = "pi-context-prune"
source = "npm:pi-context-prune"

[[extensions]]
name = "pi-subagents"
source = "npm:pi-subagents"
enabled = true

[[extensions]]
name = "pi-rtk-optimizer"
source = "npm:pi-rtk-optimizer"
enabled = true
requires_binary = "rtk"

[[extensions]]
name = "rpiv-todo"
source = "npm:@juicesharp/rpiv-todo"
enabled = true

[[extensions]]
name = "pi-codex-goal"
source = "npm:pi-codex-goal"
enabled = true

[[extensions]]
name = "rpiv-ask-user-question"
source = "npm:@juicesharp/rpiv-ask-user-question"
enabled = true

[[extensions]]
name = "rpiv-btw"
source = "npm:@juicesharp/rpiv-btw"
enabled = true

[[extensions]]
name = "pi-extension-safety-guard"
source = "npm:@firstpick/pi-extension-safety-guard"
enabled = true

[[extensions]]
name = "pi-code-previews"
source = "npm:pi-code-previews"
enabled = true

[[extensions]]
name = "pi-bar"
source = "npm:pi-bar"
enabled = true

[[extensions]]
name = "unipi-compactor"
source = "npm:@pi-unipi/compactor"
enabled = true

[[files]]
source = "runtimes/pi-ghost-dag/README.md"
target = "runtimes/pi-ghost-dag/README.md"

[[files]]
source = "runtimes/pi-ghost-dag/scripts/store.mjs"
target = "runtimes/pi-ghost-dag/scripts/store.mjs"
mode = "0755"

[[files]]
source = "runtimes/pi-ghost-dag/scripts/server.mjs"
target = "runtimes/pi-ghost-dag/scripts/server.mjs"
mode = "0755"

[[files]]
source = "runtimes/pi-ghost-dag/scripts/cli.mjs"
target = "runtimes/pi-ghost-dag/scripts/cli.mjs"
mode = "0755"

[[files]]
source = "agents/dag-planner.md"
target = "agents/dag-planner.md"

[[files]]
source = "agents/dag-runner.md"
target = "agents/dag-runner.md"

[[files]]
source = "agents/dag-worker.md"
target = "agents/dag-worker.md"

[[files]]
source = "agents/dag-reviewer.md"
target = "agents/dag-reviewer.md"

[[home_files]]
source = "configs/unipi/compactor/config.json"
target = ".unipi/config/compactor/config.json"
mode = "0644"

[[remove_files]]
target = "skills/api-doc-flow/SKILL.md"

[[remove_files]]
target = "skills/api-doc-flow/scripts/task-store.mjs"

[[remove_files]]
target = "skills/api-doc-flow/scripts/claim-next-task.mjs"

[[remove_files]]
target = "skills/api-doc-flow/scripts/finish-task.mjs"

[[remove_files]]
target = "agents/api-doc-fix-one.md"

[[remove_files]]
target = "agents/api-doc-plan-dag.md"

[[remove_files]]
target = "agents/api-doc-run-next.md"

[[remove_files]]
target = "runtimes/pi-ghost-dag/templates/api-doc-fix/planner.md"

[[remove_files]]
target = "runtimes/pi-ghost-dag/templates/api-doc-fix/worker.md"
